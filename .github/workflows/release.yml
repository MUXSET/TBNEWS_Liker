# =================================================================
#  GitHub Actions: 自动打包发布
#  触发: push tag v* (如 v2.0.0)
#  产物: macOS 和 Windows 的完整即开即用 zip 包
# =================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact_name: TBNEWS_Liker-macos
          - os: windows-latest
            platform: windows
            artifact_name: TBNEWS_Liker-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Build with PyInstaller
        run: pyinstaller TBNEWS_Liker.spec

      # --- macOS: 组装 zip ---
      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          RELEASE_DIR="TBNEWS_Liker-${TAG}-macos"
          mkdir -p "$RELEASE_DIR"

          # 复制 .app bundle
          cp -R "dist/E+新闻点赞工具.app" "$RELEASE_DIR/"

          # 复制 Playwright 浏览器
          BROWSER_SRC="$HOME/Library/Caches/ms-playwright"
          mkdir -p "$RELEASE_DIR/ms-playwright"
          cp -R "$BROWSER_SRC"/chromium-* "$RELEASE_DIR/ms-playwright/"
          cp -R "$BROWSER_SRC"/chromium_headless_shell-* "$RELEASE_DIR/ms-playwright/" 2>/dev/null || true
          cp -R "$BROWSER_SRC"/ffmpeg-* "$RELEASE_DIR/ms-playwright/" 2>/dev/null || true

          # 打 zip
          zip -r -y "$RELEASE_DIR.zip" "$RELEASE_DIR"
          echo "ASSET_PATH=${RELEASE_DIR}.zip" >> $GITHUB_ENV
          echo "ASSET_NAME=${RELEASE_DIR}.zip" >> $GITHUB_ENV

      # --- Windows: 组装 zip ---
      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          $releaseDir = "TBNEWS_Liker-${tag}-windows"
          New-Item -ItemType Directory -Path $releaseDir -Force

          # 复制 PyInstaller 产物
          Copy-Item -Recurse "dist\E+新闻点赞工具\*" "$releaseDir\"

          # 复制 Playwright 浏览器
          $browserSrc = "$env:LOCALAPPDATA\ms-playwright"
          $browserDest = "$releaseDir\ms-playwright"
          New-Item -ItemType Directory -Path $browserDest -Force
          Get-ChildItem "$browserSrc" -Directory | Where-Object { $_.Name -match '^(chromium|ffmpeg)' } | ForEach-Object {
              Copy-Item -Recurse $_.FullName "$browserDest\"
          }

          # 打 zip
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "$releaseDir.zip"
          echo "ASSET_PATH=$releaseDir.zip" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "ASSET_NAME=$releaseDir.zip" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "E+ 新闻点赞工具 ${{ github.ref_name }}"
          body: |
            ## 🚀 E+ 新闻全自动点赞工具 ${{ github.ref_name }}

            > **即开即用！** 下载对应平台的 zip → 解压 → 双击运行，无需安装 Python 或任何依赖。

            ### ✨ 新功能亮点

            | 功能 | 说明 |
            |------|------|
            | 🖥️ **全新 GUI 仪表板** | 现代化桌面界面（CustomTkinter），实时统计卡片 |
            | 📅 **按日期范围扫描** | 今天 / 昨天 / 本周 / 本月 / 上月 / 自定义，精确补赞 |
            | 📱 **手机远程控制** | Web 面板 `http://局域网IP:5050`，手机浏览器即可操作 |
            | 📦 **智能缓存** | 自动跳过已赞文章，减少 API 请求 |
            | 👥 **多账号管理** | 一键切换，独立统计 |
            | 🔑 **Token 实时校验** | 每 5 分钟 API 验证，过期自动刷新 |
            | 📊 **月报导出** | 一键导出 CSV 点赞报告 |

            ### 📥 下载说明

            | 文件 | 适用平台 |
            |------|----------|
            | `TBNEWS_Liker-${{ github.ref_name }}-macos.zip` | macOS (Apple Silicon / Intel) |
            | `TBNEWS_Liker-${{ github.ref_name }}-windows.zip` | Windows 10/11 |

            ### 🏁 快速开始

            1. 下载对应平台的 zip 文件
            2. 解压到任意位置
            3. **macOS**: 双击 `E+新闻点赞工具.app`
            4. **Windows**: 双击 `E+新闻点赞工具.exe`
            5. 首次使用点击 ⚙️ 设置，输入工号和密码即可

            > ⚠️ macOS 首次打开可能提示"未知开发者"，请前往 **系统设置 → 隐私与安全性 → 仍要打开**。
          generate_release_notes: true
          files: artifacts/**/*.zip
